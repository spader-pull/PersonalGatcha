<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Gacha</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0f0f14;
    --surface:  #1a1a24;
    --surface2: #22223a;
    --border:   rgba(255,255,255,0.08);
    --border2:  rgba(255,255,255,0.15);
    --text:     #e8e8f0;
    --muted:    #888899;
    --gem:      #a78bfa;

    --r1-color: #6b7280;
    --r1-glow:  rgba(107,114,128,0.3);
    --r2-color: #3b82f6;
    --r2-glow:  rgba(59,130,246,0.35);
    --r3-color: #a855f7;
    --r3-glow:  rgba(168,85,247,0.4);
    --r4-color: #f59e0b;
    --r4-glow:  rgba(245,158,11,0.5);
    --r5-color: #fff;
    --r5-glow:  rgba(255,255,255,0.6);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    max-width: 860px;
    padding: 1.5rem 1rem 0;
    display: flex;
    align-items: baseline;
    gap: 1.5rem;
  }

  header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--text);
  }

  .gem-display {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 14px;
    font-weight: 600;
    color: var(--gem);
  }

  .gem-dot {
    width: 12px; height: 12px;
    background: var(--gem);
    border-radius: 50%;
    box-shadow: 0 0 6px var(--gem);
  }

  main {
    width: 100%;
    max-width: 860px;
    padding: 1.25rem 1rem 3rem;
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 4px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 1.5rem;
  }

  .tab {
    padding: 10px 20px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--muted);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
    letter-spacing: 0.03em;
    margin-bottom: -1px;
  }

  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); border-bottom-color: var(--gem); }

  .panel { display: none; }
  .panel.active { display: block; }

  /* Pull panel */
  .pull-layout {
    display: flex;
    gap: 1.5rem;
    align-items: flex-start;
  }

  .pull-left {
    flex: 1;
    min-width: 0;
  }

  .pull-right {
    width: 178px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 1rem;
  }

  .pull-center { text-align: center; padding: 1rem 0 0.5rem; }

  .pity-row {
    display: flex;
    align-items: center;
    gap: 10px;
    max-width: 420px;
    margin: 0 auto 1.5rem;
    font-size: 12px;
    color: var(--muted);
  }

  .pity-track {
    flex: 1;
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }

  .pity-fill {
    height: 100%;
    background: var(--gem);
    border-radius: 2px;
    transition: width 0.4s ease;
    box-shadow: 0 0 6px var(--gem);
  }

  .pull-btns {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 2rem;
    flex-wrap: wrap;
  }

  .pull-btn {
    padding: 12px 28px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    min-width: 130px;
  }

  .pull-btn:hover { background: var(--surface2); border-color: var(--gem); }
  .pull-btn:active { transform: scale(0.97); }

  .pull-btn .cost {
    display: block;
    font-size: 11px;
    font-weight: 400;
    color: var(--gem);
    margin-top: 3px;
  }

  .free-btn {
    padding: 12px 20px;
    background: none;
    border: 1px dashed var(--border2);
    border-radius: 8px;
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
    min-width: 120px;
  }

  .free-btn:hover { color: var(--text); border-color: var(--gem); }
  .free-btn .cost { display: block; font-size: 11px; color: var(--gem); margin-top: 3px; }

  /* Result area */
  .result-area {
    min-height: 180px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .result-cards {
    display: grid;
    grid-template-columns: repeat(3, 158px);
    gap: 14px;
    justify-content: center;
  }

  .result-cards .flip-card:nth-child(4) { grid-column: 1; justify-self: end; }
  .result-cards .flip-card:nth-child(5) { grid-column: 2; justify-self: start; }

  /* Card stack */
  .card-stack {
    position: relative;
    width: 158px;
    height: 211px;
    margin-bottom: 12px;
    cursor: pointer;
  }

  .card-stack:hover .stack-card:last-child { transform: translateY(-6px) rotate(0deg); }

  .stack-card {
    position: absolute;
    width: 158px;
    height: 211px;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border2);
    background: var(--surface);
    transition: transform 0.2s ease;
    backface-visibility: hidden;
  }

  .stack-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .stack-card .stack-fallback {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: repeating-linear-gradient(
      45deg,
      rgba(167,139,250,0.06) 0px,
      rgba(167,139,250,0.06) 2px,
      transparent 2px,
      transparent 10px
    );
  }

  .stack-card img.loaded + .stack-fallback { display: none; }

  .stack-card:nth-child(1) { transform: rotate(-4deg) translateY(6px); }
  .stack-card:nth-child(2) { transform: rotate(-2deg) translateY(3px); }
  .stack-card:nth-child(3) { transform: rotate(0deg) translateY(0px); }

  .stack-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-align: center;
  }

  /* Flying card animation */
  .flying-card {
    position: fixed;
    width: 158px;
    height: 211px;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border2);
    background: var(--surface);
    pointer-events: none;
    z-index: 200;
    backface-visibility: hidden;
  }

  .flying-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .flying-card .stack-fallback {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: repeating-linear-gradient(
      45deg,
      rgba(167,139,250,0.06) 0px,
      rgba(167,139,250,0.06) 2px,
      transparent 2px,
      transparent 10px
    );
  }

  .flying-card img.loaded + .stack-fallback { display: none; }

  .result-hint {
    color: var(--muted);
    font-size: 14px;
  }

  .result-cards {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    animation: floatIn 0.35s ease both;
  }

  .result-cards .card {
    width: 158px;
  }

  .result-cards .card-name { font-size: 13px; }
  .result-cards .card-sub  { font-size: 11px; }

  /* Flip card animation */
  .flip-card {
    width: 158px;
    aspect-ratio: 3/4;
    perspective: 800px;
    flex-shrink: 0;
    cursor: pointer;
  }

  .flip-card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transform: rotateY(180deg);
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .flip-card-inner.flipped {
    transform: rotateY(0deg);
  }

  .flip-card-front,
  .flip-card-back {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 10px;
    overflow: hidden;
  }

  .flip-card-back {
    background: var(--surface);
    border: 1px solid var(--border2);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
    transform: rotateY(180deg);
    overflow: hidden;
  }

  .flip-card-back img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .flip-card-back .flip-card-back-fallback {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    height: 100%;
    position: absolute;
    inset: 0;
  }

  .flip-card-back img.loaded + .flip-card-back-fallback { display: none; }

  .flip-card-back-emblem {
    font-size: 42px;
    filter: drop-shadow(0 0 12px rgba(167,139,250,0.6));
  }

  .flip-card-back-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gem);
  }

  .flip-card-front {
    transform: rotateY(0deg);
  }

  @keyframes shimmer {
    0%   { box-shadow: 0 0 0px transparent; }
    50%  { box-shadow: 0 0 20px var(--rarity-glow, rgba(167,139,250,0.5)); }
    100% { box-shadow: 0 0 0px transparent; }
  }

  .flip-card-inner.flipped .flip-card-front {
    animation: shimmer 0.8s ease 0.45s both;
  }

  .result-note {
    margin-top: 12px;
    font-size: 12px;
    color: var(--muted);
  }

  /* Cards */
  .card {
    width: 100px;
    border-radius: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    overflow: hidden;
    position: relative;
    transition: transform 0.15s;
    cursor: default;
  }

  .card:hover { transform: translateY(-3px); }

  .card-img-wrap {
    width: 100%;
    aspect-ratio: 3/4;
    background: var(--surface2);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .card-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .card-img-wrap .card-fallback {
    font-size: 36px;
    line-height: 1;
    position: absolute;
  }

  .card-img-wrap img.loaded + .card-fallback { display: none; }

  .card-footer {
    padding: 7px 8px 8px;
  }

  .card-name {
    font-size: 11px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-sub {
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }

  .rarity-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 2px;
  }

  .r1 .rarity-bar { background: var(--r1-color); }
  .r2 .rarity-bar { background: var(--r2-color); box-shadow: 0 0 6px var(--r2-glow); }
  .r3 .rarity-bar { background: var(--r3-color); box-shadow: 0 0 8px var(--r3-glow); }
  .r4 .rarity-bar { background: var(--r4-color); box-shadow: 0 0 10px var(--r4-glow); }
  .r5 .rarity-bar { background: linear-gradient(90deg, #a78bfa, #fff, #f59e0b); box-shadow: 0 0 14px rgba(255,255,255,0.5); }

  .r2 .card-img-wrap { background: linear-gradient(180deg, #1a1a24 60%, #0d1a33); }
  .r3 .card-img-wrap { background: linear-gradient(180deg, #1a1a24 60%, #1a0d2e); }
  .r4 .card-img-wrap { background: linear-gradient(180deg, #1a1a24 55%, #2a1a00); }
  .r5 .card-img-wrap { background: linear-gradient(180deg, #1a1a24 40%, #1a1030); }

  .rarity-badge {
    position: absolute;
    top: 5px;
    right: 5px;
    font-size: 9px;
    font-weight: 700;
    padding: 2px 5px;
    border-radius: 4px;
    letter-spacing: 0.04em;
  }

  .r1 .rarity-badge { background: rgba(107,114,128,0.7); color: #e5e7eb; }
  .r2 .rarity-badge { background: rgba(59,130,246,0.7); color: #bfdbfe; }
  .r3 .rarity-badge { background: rgba(168,85,247,0.7); color: #e9d5ff; }
  .r4 .rarity-badge { background: rgba(245,158,11,0.75); color: #fef3c7; }
  .r5 .rarity-badge { background: linear-gradient(135deg, rgba(167,139,250,0.85), rgba(255,255,255,0.85)); color: #1a1a24; }

  .new-badge {
    position: absolute;
    top: 5px;
    left: 5px;
    font-size: 9px;
    font-weight: 700;
    padding: 2px 5px;
    border-radius: 4px;
    background: rgba(16,185,129,0.8);
    color: #d1fae5;
    letter-spacing: 0.04em;
  }

  .dupe-badge {
    position: absolute;
    bottom: 26px;
    right: 5px;
    font-size: 9px;
    font-weight: 700;
    padding: 2px 5px;
    border-radius: 4px;
    background: rgba(0,0,0,0.6);
    color: var(--muted);
  }

  /* Card pool & gallery grids */
  .section-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
    flex-wrap: wrap;
    gap: 8px;
  }

  .section-info { font-size: 13px; color: var(--muted); }

  .filter-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 4px 12px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: none;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn:hover { color: var(--text); border-color: var(--border2); }
  .filter-btn.active { border-color: var(--gem); color: var(--gem); }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px;
  }

  .cards-grid .card {
    width: 100%;
  }

  .cards-grid .card-name { font-size: 13px; }
  .cards-grid .card-sub  { font-size: 11px; }

  .pool-card-owned .card-img-wrap::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(16,185,129,0.1);
  }

  .owned-check {
    position: absolute;
    bottom: 5px;
    right: 5px;
    width: 16px; height: 16px;
    background: rgba(16,185,129,0.85);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    color: #d1fae5;
    font-weight: 700;
  }

  .drop-rate {
    font-size: 10px;
    color: var(--muted);
    margin-top: 1px;
  }

  .empty-state {
    text-align: center;
    padding: 4rem 0;
    color: var(--muted);
    font-size: 14px;
  }

  .empty-state .icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }

  .card-section-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 1.5rem 0 1rem;
  }

  .card-section-divider::before,
  .card-section-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border2);
  }

  .card-section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gem);
    white-space: nowrap;
  }

  @keyframes floatIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: none; }
  }

  @media (max-width: 500px) {
    .card { width: 88px; }
    .cards-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    backdrop-filter: blur(6px);
  }

  .modal-overlay.open { display: flex; animation: fadeIn 0.2s ease; }

  .modal {
    position: relative;
    max-height: 90vh;
    max-width: 420px;
    width: 100%;
    border-radius: 16px;
    overflow: hidden;
    animation: slideUp 0.25s ease;
    box-shadow: 0 0 60px rgba(0,0,0,0.8);
    border: 3px solid transparent;
  }

  .modal.border-r1 { border-color: var(--r1-color); box-shadow: 0 0 30px var(--r1-glow), 0 0 60px rgba(0,0,0,0.8); }
  .modal.border-r2 { border-color: var(--r2-color); box-shadow: 0 0 30px var(--r2-glow), 0 0 60px rgba(0,0,0,0.8); }
  .modal.border-r3 { border-color: var(--r3-color); box-shadow: 0 0 35px var(--r3-glow), 0 0 60px rgba(0,0,0,0.8); }
  .modal.border-r4 { border-color: var(--r4-color); box-shadow: 0 0 40px var(--r4-glow), 0 0 60px rgba(0,0,0,0.8); }
  .modal.border-r5 {
    border-image: linear-gradient(135deg, #a78bfa, #fff, #f59e0b, #a78bfa) 1;
    border-radius: 16px;
    box-shadow: 0 0 50px rgba(167,139,250,0.5), 0 0 80px rgba(245,158,11,0.3), 0 0 60px rgba(0,0,0,0.8);
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: none; }
  }

  .modal-close {
    position: absolute;
    top: 12px; right: 12px;
    width: 32px; height: 32px;
    background: rgba(0,0,0,0.6);
    border: none;
    border-radius: 50%;
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
    z-index: 10;
  }

  .modal-close:hover { background: rgba(255,255,255,0.15); }

  .modal-img-wrap {
    width: 100%;
    height: 100%;
    display: block;
    position: relative;
    background: var(--surface2);
  }

  .modal-img-wrap img {
    width: 100%;
    display: block;
    max-height: 90vh;
    object-fit: contain;
  }

  .modal-img-wrap .modal-fallback {
    font-size: 140px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4rem 0;
  }

  .modal-img-wrap img.loaded + .modal-fallback { display: none; }

  .modal-footer {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 2rem 1.25rem 1.25rem;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .modal-title { font-size: 18px; font-weight: 700; color: #fff; line-height: 1.2; }
  .modal-cls   { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 3px; }
  .modal-stars { font-size: 14px; letter-spacing: 2px; }
  .modal-stars.r1 { color: var(--r1-color); }
  .modal-stars.r2 { color: var(--r2-color); }
  .modal-stars.r3 { color: var(--r3-color); }
  .modal-stars.r4 { color: var(--r4-color); }
  .modal-stars.r5 { background: linear-gradient(90deg,#a78bfa,#fff,#f59e0b); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }

  .modal-rarity-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
  }

  @media (max-width: 480px) {
    .modal { max-width: 100%; }
  }
</style>
</head>
<body>

<header>
  <h1>✦ Gacha</h1>
  <div class="gem-display">
    <div class="gem-dot"></div>
    <span id="gems-display">1000</span> gems
  </div>
</header>

<!-- Card Detail Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-box">
    <button class="modal-close" onclick="closeModal(null)">✕</button>
    <div class="modal-img-wrap" id="modal-img-wrap"></div>
    <div class="modal-footer">
      <div>
        <div class="modal-title" id="modal-title"></div>
        <div class="modal-cls" id="modal-cls"></div>
      </div>
      <div class="modal-stars" id="modal-stars"></div>
    </div>
    <div class="modal-rarity-bar" id="modal-rarity-bar"></div>
  </div>
</div>

<main>
  <div class="tabs">
    <button class="tab active" onclick="showTab('pull')">Pull</button>
    <button class="tab" onclick="showTab('pool')">Card Pool <span id="pool-tab-count" style="opacity:0.5; font-size:12px;"></span></button>
    <button class="tab" onclick="showTab('gallery')">Gallery <span id="gallery-tab-count" style="opacity:0.5; font-size:12px;"></span></button>
  </div>

  <!-- Pull Panel -->
  <div id="tab-pull" class="panel active">
    <div class="pull-layout">
      <div class="pull-left">
        <div class="pull-center">
          <div class="pity-row">
            <span>Pity: <span id="pity-num">0</span>/90</span>
            <div class="pity-track"><div class="pity-fill" id="pity-fill" style="width:0%"></div></div>
            <span>✦✦✦✦ guaranteed at 90</span>
          </div>
          <div class="pull-btns">
            <button class="pull-btn" onclick="doPull(1)">Pull ×1<span class="cost">◆ 160 gems</span></button>
            <button class="pull-btn" onclick="doPull(5)">Pull ×5<span class="cost">◆ 800 gems</span></button>
            <button class="free-btn" onclick="addGems()">+ Free Gems<span class="cost">+500</span></button>
          </div>
          <div class="result-area" id="result-area">
            <p class="result-hint">Pull to discover new cards</p>
          </div>
        </div>
      </div>
      <div class="pull-right">
        <div class="card-stack" id="card-stack">
          <div class="stack-card">
            <img src="cards/c-back.jpeg" alt="Card back" onload="this.classList.add('loaded')" onerror="this.style.display='none'">
            <div class="stack-fallback"><span style="font-size:36px;filter:drop-shadow(0 0 10px rgba(167,139,250,0.6))">✦</span></div>
          </div>
          <div class="stack-card">
            <img src="cards/c-back.jpeg" alt="Card back" onload="this.classList.add('loaded')" onerror="this.style.display='none'">
            <div class="stack-fallback"><span style="font-size:36px;filter:drop-shadow(0 0 10px rgba(167,139,250,0.6))">✦</span></div>
          </div>
          <div class="stack-card">
            <img src="cards/c-back.jpeg" alt="Card back" onload="this.classList.add('loaded')" onerror="this.style.display='none'">
            <div class="stack-fallback"><span style="font-size:36px;filter:drop-shadow(0 0 10px rgba(167,139,250,0.6))">✦</span></div>
          </div>
        </div>
        <div class="stack-label">Card Pool</div>
      </div>
    </div>
  </div>

  <!-- Pool Panel -->
  <div id="tab-pool" class="panel">
    <div class="section-bar">
      <span class="section-info">All <strong id="pool-total"></strong> cards · hover for drop rate</span>
      <div class="filter-row" id="pool-filters"></div>
    </div>
    <div id="pool-grid"></div>
  </div>

  <!-- Gallery Panel -->
  <div id="tab-gallery" class="panel">
    <div class="section-bar">
      <span class="section-info" id="gallery-info">Cards you've collected</span>
      <div class="filter-row" id="gallery-filters"></div>
    </div>
    <div id="gallery-content"></div>
  </div>
</main>

<script>
/*
  Card images are loaded from:   cards/<card-id>.png
  Place your image files in a folder called "cards/" in the same directory as this HTML file.
  Supported formats: .png  (change IMG_EXT below for .jpg or .webp)
  If an image is missing, the emoji fallback is shown automatically.

  Example file structure:
    gacha.html
    cards/
      c1.png
      c2.png
      ...
      c36.jpeg
      b1.jpeg
      b2.jpeg
      b3.jpeg
      b4.jpeg
*/

const IMG_EXT = '.jpeg';
const IMG_FOLDER = 'Cards/';

const CARDS = [
  { id:'c1',  name:'Marta',            cls:'Warrior', rarity:1, icon:'⚔️',  rate:0.45  },
  { id:'c2',  name:'Berta',            cls:'Warrior', rarity:1, icon:'⚔️',  rate:0.45  },
  { id:'c3',  name:'Ilse',             cls:'Warrior', rarity:1, icon:'⚔️',  rate:0.45  },
  { id:'c4',  name:'Gunna',            cls:'Archer',  rarity:1, icon:'🏹',  rate:0.45  },
  { id:'c5',  name:'Frieda',           cls:'Archer',  rarity:1, icon:'🏹',  rate:0.45  },
  { id:'c6',  name:'Willa',            cls:'Archer',  rarity:1, icon:'🏹',  rate:0.45  },
  { id:'c7',  name:'Nessa',            cls:'Rogue',   rarity:1, icon:'🗡️',  rate:0.45  },
  { id:'c8',  name:'Tilda',            cls:'Rogue',   rarity:1, icon:'🗡️',  rate:0.45  },
  { id:'c9',  name:'Odra',             cls:'Mage',    rarity:1, icon:'🌿',  rate:0.45  },
  { id:'c10', name:'Corporal Edda',          cls:'Warrior',    rarity:2, icon:'⚔️',  rate:0.11  },
  { id:'c11', name:'Corporal Maud',          cls:'Warrior',    rarity:2, icon:'⚔️',  rate:0.11  },
  { id:'c12', name:'Sergeant Hilda',         cls:'Tank',       rarity:2, icon:'🛡️',  rate:0.11  },
  { id:'c13', name:'Scout Lena',             cls:'Archer',     rarity:2, icon:'🏹',  rate:0.11  },
  { id:'c14', name:'Scout Britta',           cls:'Archer',     rarity:2, icon:'🏹',  rate:0.11  },
  { id:'c15', name:'"Slip"',                 cls:'Rogue',      rarity:2, icon:'🗡️',  rate:0.11  },
  { id:'c16', name:'"Foxglove"',             cls:'Rogue',      rarity:2, icon:'🗡️',  rate:0.11  },
  { id:'c17', name:'Cressida',               cls:'Mage',       rarity:2, icon:'🌿',  rate:0.11  },
  { id:'c18', name:'Acolyte Sera',           cls:'Healer',     rarity:2, icon:'✚',   rate:0.11  },
  { id:'c19', name:'Adventurer Lysa',        cls:'Adventurer', rarity:2, icon:'🎒',  rate:0.11  },
  { id:'c20', name:'Adventurer Maren',       cls:'Adventurer', rarity:2, icon:'🎒',  rate:0.11  },
  { id:'c21', name:'Blademaster Rhiannon',   cls:'Warrior',    rarity:3, icon:'⚔️',  rate:0.04  },
  { id:'c22', name:'Ranger Isolde',          cls:'Archer',     rarity:3, icon:'🏹',  rate:0.04  },
  { id:'c23', name:'Ironclad Brynn',         cls:'Tank',       rarity:3, icon:'🛡️',  rate:0.04  },
  { id:'c24', name:'Arcanist Vesper',        cls:'Mage',       rarity:3, icon:'💎',  rate:0.04  },
  { id:'c25', name:'Hexblade Morrigan',      cls:'Witch',      rarity:3, icon:'🌑',  rate:0.04  },
  { id:'c26', name:'Cleric Elowen',          cls:'Healer',     rarity:3, icon:'✨',  rate:0.04  },
  { id:'c27', name:'Martial Artist Mei Xiu', cls:'Martial Artist', rarity:3, icon:'🥋',  rate:0.04  },
  { id:'c28', name:'Martial Artist Lan Rong',cls:'Martial Artist', rarity:3, icon:'🥋',  rate:0.04  },
  { id:'c29', name:'Shadowstep Caelindra',   cls:'Rogue',          rarity:3, icon:'🗡️',  rate:0.04  },
  { id:'c30', name:'Warchief Brunhilde',      cls:'Barbarian',      rarity:3, icon:'🪓',  rate:0.04  },
  { id:'c31', name:'Empress of Blades, Seraphine',        cls:'Warrior',  rarity:4, icon:'⚔️',  rate:0.006 },
  { id:'c32', name:'Archmage Eternal, Lyraniel',          cls:'Mage',     rarity:4, icon:'✨',  rate:0.006 },
  { id:'c33', name:'Sovereign of the Abyss, Vexara',      cls:'Demoness', rarity:4, icon:'🔥',  rate:0.006 },
  { id:'c34', name:'Crown of the Undying Realm, Elara',   cls:'Princess', rarity:4, icon:'👑',  rate:0.006 },
  { id:'c35', name:'Radiant Absolute, Aelindra',          cls:'Goddess of Light',    rarity:5, icon:'🌟',  rate:0.001 },
  { id:'c36', name:'Void Eternal, Noctivara',             cls:'Goddess of Darkness', rarity:5, icon:'🌌',  rate:0.001 },
];

const CARDS_B = [
  { id:'b1', name:'Corsair Marguerite',  cls:'Pirate',       rarity:3, icon:'🏴‍☠️', rate:0.04  },
  { id:'b2', name:'Shadow Veil Yuki',    cls:'Ninja',        rarity:3, icon:'🥷',   rate:0.04  },
  { id:'b3', name:'Velvet Sin Lilura',   cls:'Succubus',     rarity:3, icon:'😈',   rate:0.04  },
  { id:'b4', name:'Little Imp Nyx',      cls:'Jr. Succubus', rarity:2, icon:'🍭',   rate:0.11  },
];

const ALL_CARDS = [...CARDS, ...CARDS_B];

const RARITY_STARS = { 1:'✦', 2:'✦✦', 3:'✦✦✦', 4:'✦✦✦✦', 5:'✦✦✦✦✦' };

const RARITY_BAR_STYLE = {
  1: 'background:#6b7280',
  2: 'background:#3b82f6',
  3: 'background:#a855f7',
  4: 'background:#f59e0b',
  5: 'background:linear-gradient(90deg,#a78bfa,#fff,#f59e0b)',
};

function openModal(cardId) {
  const card = ALL_CARDS.find(c => c.id === cardId);
  if (!card) return;
  const r = card.rarity;

  const imgWrap = document.getElementById('modal-img-wrap');
  imgWrap.innerHTML = `
    <img src="${imgSrc(card.id)}" alt="${card.name}" onload="this.classList.add('loaded')" onerror="this.style.display='none'">
    <div class="modal-fallback">${card.icon}</div>`;

  const modalBox = document.getElementById('modal-box');
  modalBox.className = 'modal border-r' + r;

  document.getElementById('modal-rarity-bar').style = RARITY_BAR_STYLE[r];
  document.getElementById('modal-title').textContent = card.name;
  document.getElementById('modal-cls').textContent = card.cls;
  const starsEl = document.getElementById('modal-stars');
  starsEl.textContent = RARITY_STARS[r];
  starsEl.className = 'modal-stars r' + r;

  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('open');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') document.getElementById('modal-overlay').classList.remove('open'); });

let gems = 1000000, pity = 0, gallery = {};
let poolFilter = 'all', galleryFilter = 'all';

function imgSrc(id) { return IMG_FOLDER + id + IMG_EXT; }

function cardImgWrap(card) {
  return `<div class="card-img-wrap">
    <img src="${imgSrc(card.id)}" alt="${card.name}" onload="this.classList.add('loaded')" onerror="this.style.display='none'">
    <div class="card-fallback">${card.icon}</div>
  </div>`;
}

function cardEl(card, opts = {}) {
  const { isNew = false, count = 0, showRate = false, ownedCheck = false } = opts;
  const rarityClass = 'r' + card.rarity;
  return `<div class="card ${rarityClass}${ownedCheck ? ' pool-card-owned' : ''}" onclick="openModal('${card.id}')" style="cursor:pointer" title="Click to view details">
    ${cardImgWrap(card)}
    <span class="rarity-badge">${RARITY_STARS[card.rarity]}</span>
    ${isNew ? `<span class="new-badge">NEW</span>` : ''}
    ${count > 1 ? `<span class="dupe-badge">×${count}</span>` : ''}
    ${ownedCheck ? `<span class="owned-check">✓</span>` : ''}
    <div class="rarity-bar"></div>
    <div class="card-footer">
      <div class="card-name">${card.name}</div>
      <div class="card-sub">${card.cls}</div>
      ${showRate ? `<div class="drop-rate">${(card.rate * 100).toFixed(1)}%</div>` : ''}
    </div>
  </div>`;
}

function weightedPull() {
  pity++;
  if (pity >= 90) {
    pity = 0;
    const pool = ALL_CARDS.filter(c => c.rarity === 4);
    return pool[Math.floor(Math.random() * pool.length)];
  }
  const roll = Math.random();
  let pool;
  if      (roll < 0.002) pool = ALL_CARDS.filter(c => c.rarity === 5);
  else if (roll < 0.016) pool = ALL_CARDS.filter(c => c.rarity === 4);
  else if (roll < 0.08)  pool = ALL_CARDS.filter(c => c.rarity === 3);
  else if (roll < 0.35)  pool = ALL_CARDS.filter(c => c.rarity === 2);
  else                   pool = ALL_CARDS.filter(c => c.rarity === 1);
  return pool[Math.floor(Math.random() * pool.length)];
}

function doPull(n) {
  const cost = n * 160;
  if (gems < cost) { alert('Not enough gems — grab some free ones!'); return; }
  gems -= cost;
  document.getElementById('gems-display').textContent = gems;

  const pulled = [];
  for (let i = 0; i < n; i++) pulled.push(weightedPull());
  pulled.forEach(c => { gallery[c.id] = (gallery[c.id] || 0) + 1; });

  updatePity();
  updateCounts();
  animatePull(pulled);
}

function animatePull(pulled) {
  const stack = document.getElementById('card-stack');
  const stackRect = stack.getBoundingClientRect();
  const ra = document.getElementById('result-area');
  const raRect = ra.getBoundingClientRect();

  // Clear result area and disable buttons during animation
  ra.innerHTML = '';
  document.querySelectorAll('.pull-btn, .free-btn').forEach(b => b.disabled = true);

  const total = pulled.length;
  const flyDuration = 380; // ms per card flight
  const delay = total === 1 ? 0 : 160; // stagger

  pulled.forEach((card, i) => {
    setTimeout(() => {
      // Create flying card element
      const fly = document.createElement('div');
      fly.className = 'flying-card';
      fly.style.cssText = `
        left: ${stackRect.left}px;
        top: ${stackRect.top}px;
        transition: left ${flyDuration}ms cubic-bezier(0.25,0.46,0.45,0.94),
                    top ${flyDuration}ms cubic-bezier(0.25,0.46,0.45,0.94),
                    opacity ${flyDuration * 0.3}ms ease ${flyDuration * 0.7}ms;
      `;
      fly.innerHTML = `
        <img src="${IMG_FOLDER}c-back${IMG_EXT}" alt="Card back" onload="this.classList.add('loaded')" onerror="this.style.display='none'">
        <div class="stack-fallback"><span style="font-size:36px;filter:drop-shadow(0 0 10px rgba(167,139,250,0.6))">✦</span></div>`;
      document.body.appendChild(fly);

      // Animate to result area (center-ish)
      requestAnimationFrame(() => requestAnimationFrame(() => {
        const destX = raRect.left + (raRect.width / 2) - 79 + (Math.random() * 20 - 10);
        const destY = raRect.top + 20;
        fly.style.left = destX + 'px';
        fly.style.top  = destY + 'px';
        fly.style.opacity = '0';
      }));

      // After flight, remove fly card and place real flip card
      setTimeout(() => {
        fly.remove();
        insertFlipCard(card, i, ra);

        // Re-enable buttons after last card
        if (i === total - 1) {
          setTimeout(() => {
            document.querySelectorAll('.pull-btn, .free-btn').forEach(b => b.disabled = false);
            // Add result note
            const newCards = pulled.filter(c => gallery[c.id] === 1);
            const note = document.createElement('p');
            note.className = 'result-note';
            note.textContent = newCards.length
              ? newCards.length + ' new card' + (newCards.length > 1 ? 's' : '') + ' added to gallery'
              : 'All duplicates';
            ra.appendChild(note);
          }, (total * delay) + 600);
        }
      }, flyDuration);

    }, i * delay);
  });
}

function insertFlipCard(card, i, ra) {
  // Ensure result-cards container exists
  let container = ra.querySelector('.result-cards');
  if (!container) {
    container = document.createElement('div');
    container.className = 'result-cards';
    ra.appendChild(container);
  }

  const wrapper = document.createElement('div');
  wrapper.innerHTML = `
    <div class="flip-card" onclick="openModal('${card.id}')" title="Click to view details" style="--rarity-glow:${RARITY_GLOW[card.rarity]}">
      <div class="flip-card-inner" id="fc-${i}">
        <div class="flip-card-front">
          <div class="card r${card.rarity}" style="width:100%;height:100%;border-radius:10px;overflow:hidden;position:relative;">
            ${cardImgWrap(card)}
            <span class="rarity-badge">${RARITY_STARS[card.rarity]}</span>
            ${gallery[card.id] === 1 ? `<span class="new-badge">NEW</span>` : ''}
            <div class="rarity-bar"></div>
            <div class="card-footer">
              <div class="card-name" style="font-size:13px">${card.name}</div>
              <div class="card-sub" style="font-size:11px">${card.cls}</div>
            </div>
          </div>
        </div>
        <div class="flip-card-back">
          <img src="${IMG_FOLDER}c-back${IMG_EXT}" alt="Card back" onload="this.classList.add('loaded')" onerror="this.style.display='none'">
          <div class="flip-card-back-fallback">
            <div class="flip-card-back-emblem">✦</div>
            <div class="flip-card-back-label">Tap to reveal</div>
          </div>
        </div>
      </div>
    </div>`;
  container.appendChild(wrapper.firstElementChild);

  // Flip after a short pause
  setTimeout(() => {
    const el = document.getElementById('fc-' + i);
    if (el) el.classList.add('flipped');
  }, 80);
}

function addGems() {
  gems += 500;
  document.getElementById('gems-display').textContent = gems;
}

function updatePity() {
  document.getElementById('pity-num').textContent = pity;
  document.getElementById('pity-fill').style.width = Math.round(pity / 90 * 100) + '%';
}

function updateCounts() {
  const owned = Object.keys(gallery).length;
  document.getElementById('pool-tab-count').textContent = ALL_CARDS.length;
  document.getElementById('gallery-tab-count').textContent = owned || '';
}

const RARITY_GLOW = {
  1: 'rgba(107,114,128,0.4)',
  2: 'rgba(59,130,246,0.5)',
  3: 'rgba(168,85,247,0.6)',
  4: 'rgba(245,158,11,0.7)',
  5: 'rgba(255,255,255,0.6)',
};

function showTab(t) {
  document.querySelectorAll('.tab').forEach((el, i) => el.classList.toggle('active', ['pull','pool','gallery'][i] === t));
  document.querySelectorAll('.panel').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + t).classList.add('active');
  if (t === 'pool') renderPool();
  if (t === 'gallery') renderGallery();
}

function buildFilters(containerId, current, setter) {
  const rarities = [1,2,3,4];
  document.getElementById(containerId).innerHTML =
    ['all', ...rarities].map(r =>
      `<button class="filter-btn${current === (r === 'all' ? 'all' : r) ? ' active' : ''}" onclick="${setter}('${r}')">${r === 'all' ? 'All' : RARITY_STARS[r]}</button>`
    ).join('');
}

function renderPool() {
  document.getElementById('pool-total').textContent = ALL_CARDS.length;
  buildFilters('pool-filters', poolFilter, 'setPoolFilter');

  const filteredC = (poolFilter === 'all' ? CARDS : CARDS.filter(c => c.rarity == poolFilter));
  const filteredB = (poolFilter === 'all' ? CARDS_B : CARDS_B.filter(c => c.rarity == poolFilter));

  const sectionB = filteredB.length ? `
    <div class="card-section-divider">
      <span class="card-section-label">Special</span>
    </div>
    <div class="cards-grid">${filteredB.map(c => cardEl(c, { showRate: true, ownedCheck: !!gallery[c.id] })).join('')}</div>` : '';

  document.getElementById('pool-grid').innerHTML =
    `<div class="cards-grid">${filteredC.map(c => cardEl(c, { showRate: true, ownedCheck: !!gallery[c.id] })).join('')}</div>
     ${sectionB}`;
}

function setPoolFilter(f) {
  poolFilter = f === 'all' ? 'all' : Number(f);
  renderPool();
}

function renderGallery() {
  const ownedC = CARDS.filter(c => gallery[c.id]);
  const ownedB = CARDS_B.filter(c => gallery[c.id]);
  const owned = [...ownedC, ...ownedB];

  buildFilters('gallery-filters', galleryFilter, 'setGalleryFilter');

  const filteredC = galleryFilter === 'all' ? ownedC : ownedC.filter(c => c.rarity == galleryFilter);
  const filteredB = galleryFilter === 'all' ? ownedB : ownedB.filter(c => c.rarity == galleryFilter);

  const gc = document.getElementById('gallery-content');
  if (!owned.length) {
    gc.innerHTML = `<div class="empty-state"><div class="icon">🃏</div>No cards yet — start pulling!</div>`;
  } else {
    const sectionB = filteredB.length ? `
      <div class="card-section-divider">
        <span class="card-section-label">Special</span>
      </div>
      <div class="cards-grid">${filteredB.map(c => cardEl(c, { count: gallery[c.id] })).join('')}</div>` : '';

    gc.innerHTML =
      `<div class="cards-grid">${filteredC.map(c => cardEl(c, { count: gallery[c.id] })).join('')}</div>
       ${sectionB}`;
  }
  document.getElementById('gallery-info').textContent =
    owned.length ? `${owned.length} of ${ALL_CARDS.length} cards collected` : 'Cards you\'ve collected';
}

updateCounts();
</script>
</body>
</html>
